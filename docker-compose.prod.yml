services:
  db:
    container_name: sponsoring-wall-db
    image: supabase/postgres:15.1.1.78
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*' -c wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  realtime-setup:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts/init-realtime.sh:/init-realtime.sh
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "/init-realtime.sh"]

  rest:
    image: postgrest/postgrest:v12.2.0
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,api
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_EXTRA_SEARCH_PATH: public,api
      PGRST_JWT_SECRET: ${JWT_SECRET}

  realtime:
    image: ghcr.io/supabase/realtime:v2.78.11
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "4000"
      HOSTNAME: localhost
      APP_NAME: realtime
      DB_HOST: db
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PORT: "5432"
      DB_SSL: "false"
      REPLICATION_MODE: PUBLICATION
      JWT_SECRET: ${JWT_SECRET}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DB_ENC_KEY: ${REALTIME_ENCRYPTION_KEY}
      SECURE_CHANNELS: "false"

  kong:
    container_name: sponsoring-wall-kong
    image: kong:2.8.1-alpine
    restart: always
    depends_on:
      - rest
      - realtime
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=https://${DOMAIN}
        - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
        - VITE_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    restart: always
    depends_on:
      - kong

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - kong

volumes:
  db_data:
  caddy_data:
  caddy_config:
