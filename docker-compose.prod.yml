services:
  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.1.78
    restart: always
    # PRODUCTION: No external port exposure! Only internal network
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      JWT_SECRET: ${PROD_JWT_SECRET}
      REALTIME_ENCRYPTION_KEY: ${PROD_ENC_KEY}
    volumes:
      - ./supabase/init-db.sql:/docker-entrypoint-initdb.d/z99-init-db.sql
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  realtime-setup:
    container_name: realtime-setup
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      realtime:
        condition: service_started
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${PROD_JWT_SECRET}
      REALTIME_ENCRYPTION_KEY: ${PROD_ENC_KEY}
    volumes:
      - ./init-realtime.sh:/init-realtime.sh
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Realtime tables..."
        until PGPASSWORD=$$POSTGRES_PASSWORD psql -h db -U postgres -d postgres -c "SELECT 1 FROM public.tenants;" > /dev/null 2>&1; do
          sleep 2
        done
        echo "Tables are ready! Running init script..."
        /init-realtime.sh
        echo "Realtime setup is complete."
    networks:
      - internal

  kong:
    container_name: supabase-kong
    image: kong:2.8.1-alpine
    restart: always
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml
    depends_on:
      - rest
      - realtime
    networks:
      - internal
      - web

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.0
    restart: always
    # PRODUCTION: No external port! Only accessible via Kong
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PROD_JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  realtime:
    container_name: supabase-realtime
    image: ghcr.io/supabase/realtime:v2.78.11
    restart: always
    # PRODUCTION: No external port! Only accessible via Kong
    environment:
      - PORT=4000
      - HOSTNAME=localhost
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PORT=5432
      - DB_SSL=false
      - DB_URI=postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?sslmode=disable
      - JWT_SECRET=${PROD_JWT_SECRET}
      - API_JWT_SECRET=${PROD_JWT_SECRET}
      - METRICS_JWT_SECRET=${PROD_JWT_SECRET}
      - SECRET_KEY_BASE=${PROD_SECRET_KEY_BASE}
      - ERL_NODE_NAME=realtime@127.0.0.1
      - APP_NAME=realtime
      - REPLICATION_MODE=PUBLICATION
      - REPLICATION_SLOT=realtime_slot
      - DB_ENC_KEY=${PROD_ENC_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    container_name: sponsoring-wall-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      - kong
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      # SSL certificates - mount from host
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - web

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  db_data:
