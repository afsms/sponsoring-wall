services:
  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.1.78
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      JWT_SECRET: ${PROD_JWT_SECRET:-12345678901234567890123456789012}
      REALTIME_ENCRYPTION_KEY: ${PROD_ENC_KEY:-1234567890123456}
    volumes:
      - ./supabase/init-db.sql:/docker-entrypoint-initdb.d/z99-init-db.sql
      - db_data:/var/lib/postgresql/data

  realtime-setup:
    container_name: realtime-setup
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      - db
      - realtime
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      JWT_SECRET: ${PROD_JWT_SECRET:-12345678901234567890123456789012}
      REALTIME_ENCRYPTION_KEY: ${PROD_ENC_KEY:-1234567890123456}
    volumes:
      - ./init-realtime.sh:/init-realtime.sh
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Postgres and Realtime..."
        until PGPASSWORD=$$POSTGRES_PASSWORD psql -h db -U postgres -d postgres -c "SELECT 1 FROM public.tenants;" > /dev/null 2>&1; do
          sleep 2
        done
        echo "Tables are ready! Running init script..."
        /init-realtime.sh
        echo "Realtime setup is complete."
        # We restart the realtime container via docker socket or we just let it pick it up.
        # It typically picks up the new row in tenants if we reload, but Realtime re-checks tenants!

  kong:
    container_name: supabase-kong
    image: kong:2.8.1-alpine
    restart: always
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.0
    restart: always
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:postgrespassword@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "12345678901234567890123456789012"

  realtime:
    container_name: supabase-realtime
    image: ghcr.io/supabase/realtime:v2.78.11
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - HOSTNAME=localhost
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - DB_PORT=5432
      - DB_SSL=false
      - DB_URI=postgres://postgres:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/postgres?sslmode=disable
      - JWT_SECRET=${PROD_JWT_SECRET:-12345678901234567890123456789012}
      - API_JWT_SECRET=${PROD_JWT_SECRET:-12345678901234567890123456789012}
      - METRICS_JWT_SECRET=${PROD_JWT_SECRET:-12345678901234567890123456789012}
      - SECRET_KEY_BASE=${PROD_SECRET_KEY_BASE:-supersecretkeybase64charslong1234567890123456789012345678901234}
      - ERL_NODE_NAME=realtime@127.0.0.1
      - APP_NAME=realtime
      - REPLICATION_MODE=PUBLICATION
      - REPLICATION_SLOT=realtime_slot
      - DB_ENC_KEY=${PROD_ENC_KEY:-1234567890123456}

  frontend:
    container_name: sponsoring-wall-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=http://localhost:8000
        - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImF1ZCI6ImF1dGhlbnRpY2F0ZWQiLCJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3Mjg4NjA0MiwiZXhwIjoxODA0NDIyMDQyfQ.Y7tNBY9CwS0f2rOwuSlTWd-fm0Jx9lkAx8I0BZkBGck
    ports:
      - "80:80"
    restart: always
    depends_on:
      - kong

volumes:
  db_data:
