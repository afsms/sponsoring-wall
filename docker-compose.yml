version: '3.8'

services:
  db:
    image: supabase/postgres:15.1.1.78
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      JWT_SECRET: ${JWT_SECRET:-12345678901234567890123456789012}
      REALTIME_ENCRYPTION_KEY: ${REALTIME_ENCRYPTION_KEY:-1234567890123456}
    volumes:
      - ./supabase/init-db.sql:/docker-entrypoint-initdb.d/z99-init-db.sql
      - db_data:/var/lib/postgresql/data

  realtime-setup:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      - db
      - realtime
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      JWT_SECRET: ${JWT_SECRET:-12345678901234567890123456789012}
      REALTIME_ENCRYPTION_KEY: ${REALTIME_ENCRYPTION_KEY:-1234567890123456}
    volumes:
      - ./scripts/init-realtime.sh:/init-realtime.sh
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Postgres..."
        until PGPASSWORD=$$POSTGRES_PASSWORD psql -h db -U postgres -d postgres -c "SELECT 1 FROM public.tenants;" > /dev/null 2>&1; do
          sleep 2
        done
        chmod +x /init-realtime.sh
        /init-realtime.sh

  kong:
    image: kong:2.8.1-alpine
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml

  rest:
    image: postgrest/postgrest:v12.2.0
    restart: always
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-12345678901234567890123456789012}

  realtime:
    image: ghcr.io/supabase/realtime:v2.78.11
    restart: always
    environment:
      - PORT=4000
      - HOSTNAME=localhost
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - DB_PORT=5432
      - DB_SSL=false
      - DB_URI=postgres://postgres:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/postgres?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-12345678901234567890123456789012}
      - API_JWT_SECRET=${JWT_SECRET:-12345678901234567890123456789012}
      - METRICS_JWT_SECRET=${JWT_SECRET:-12345678901234567890123456789012}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-supersecretkeybase64charslong1234567890123456789012345678901234}
      - ERL_NODE_NAME=realtime@127.0.0.1
      - APP_NAME=realtime
      - REPLICATION_MODE=PUBLICATION
      - REPLICATION_SLOT=realtime_slot
      - DB_ENC_KEY=${REALTIME_ENCRYPTION_KEY:-1234567890123456}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    restart: always
    depends_on:
      - kong

volumes:
  db_data:
