_format_version: "1.1"
services:
  - name: postgrest
    url: http://rest:3000
    routes:
      - name: postgrest-route
        paths:
          - /rest/v1
        plugins:
          - name: cors
            config:
              origins: ["${DOMAIN:-*}"]
              methods: ["GET", "POST", "PATCH", "DELETE", "OPTIONS", "PUT"]
              headers: ["Authorization", "Content-Type", "apikey", "x-client-info"]
              exposed_headers: ["Content-Range", "X-Total-Count"]
              credentials: true
          - name: rate-limiting
            config:
              minute: 60
              policy: local

  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-websocket
        paths:
          - /realtime/v1/websocket
        strip_path: true
      - name: realtime-api
        paths:
          - /realtime/v1/api
        strip_path: true
    plugins:
      - name: cors
        config:
          origins: ["${DOMAIN:-*}"]
          methods: ["GET", "POST", "OPTIONS"]
          headers: ["Authorization", "Content-Type", "apikey", "x-client-info"]
          exposed_headers: ["*"]
          credentials: true
      - name: request-transformer
        config:
          replace:
            uri: /socket/websocket
